services:
  app:
    build:
      context: .
      dockerfile: Dockerfile1
      target: runtime
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
