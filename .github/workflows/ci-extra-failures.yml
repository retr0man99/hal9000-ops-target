name: CI — Extra Failure Modes

# Additional intentional failures for HAL9000-OPS testing.
# Each job exercises a different class of error.

on:
  workflow_dispatch:  # manual-only — never trigger automatically
  push:
    branches: ["main"]
    paths:
      # Only trigger when THIS file changes — avoids running on unrelated pushes
      - ".github/workflows/ci-extra-failures.yml"

jobs:
  bad-secret-ref:
    name: Bad secret reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use non-existent secret
        # NOTE: uses a valid expression syntax with an underscore-separated name.
        # The secret doesn't exist, so the value will be empty — but the
        # workflow will parse and run, allowing workflow_run events to fire.
        run: echo "token=${{ secrets.NON_EXISTENT_SECRET }}"

  unpinned-action:
    name: Unpinned action version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "This used @main instead of a pinned tag"

  latest-docker:
    name: Dockerfile with latest tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with bad Dockerfile
        run: |
          cat > /tmp/Dockerfile.bad <<'EOF'
          FROM python:latest
          COPY . /app
          CMD ["python", "main.py"]
          EOF
          docker build -f /tmp/Dockerfile.bad -t bad-image .

  bad-needs-ref:
    name: Bad needs reference
    runs-on: ubuntu-latest
    steps:
      - run: echo "This job references a needs that does not exist"
